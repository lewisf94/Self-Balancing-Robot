; PlatformIO project for the ESP32-S3 micro-ROS balancing firmware.
;
; The control core is NOT copied here: firmware/lib/sbr_control symlinks the
; exact sbr_control headers + pid.cpp + balance_controller.cpp from ../src, so
; the firmware and the ROS 2 node / gtests build the same logic.
;
; There is no ESP toolchain in the CI sandbox; build this locally with
; PlatformIO (`pio run`). See README.md.

[platformio]
default_envs = esp32-s3

[env:esp32-s3]
platform = espressif32@^6.6.0        ; arduino-esp32 v2.x (v2.x LEDC API in tb6612.hpp)
board = esp32-s3-devkitc-1           ; change to YOUR exact S3 board
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio

; micro-ROS: match the workspace ROS distro and use the serial transport.
board_microros_distro = jazzy        ; fall back to humble if jazzy is unavailable
board_microros_transport = serial

; Reuse the control core (firmware/lib/sbr_control) and the firmware headers.
lib_ldf_mode = deep+
build_flags =
    -I include
    -I lib/sbr_control
    ; ESP32-S3 native-USB CDC as the micro-ROS serial port (agent dev: /dev/ttyACM*).
    ; If you instead use the UART/JTAG bridge port (/dev/ttyUSB*), delete these two.
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Pre-build hook: link sbr_msgs into the micro-ROS build + force C++17 on the
; reused control core. (C++ only, so the micro-ROS C sources aren't warned.)
extra_scripts =
    pre:microros_extra_packages.py
